services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: recommendations
      FLASK_PORT: "5001"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
    depends_on:
      - api

volumes:
  mongo_data:
