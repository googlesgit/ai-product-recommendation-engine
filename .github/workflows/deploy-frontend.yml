# Build React app and publish to GitHub Pages (project site).
# Live URL: https://googlesgit.github.io/ai-product-recommendation-engine/
#
# Before the UI can call the API, set a repository variable:
#   Settings → Secrets and variables → Actions → Variables
#   Name: VITE_API_URL   Value: https://YOUR-RENDER-SERVICE.onrender.com/api
# See docs/DEPLOY.md for full setup (MongoDB Atlas + Render).

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /ai-product-recommendation-engine/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm install
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
